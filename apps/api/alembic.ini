# Alembic config. sqlalchemy.url is injected at runtime by migrations/env.py
# (kept ASCII-only so configparser reads it under any system locale).
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# placeholder; overridden at runtime by settings.sync_database_url in env.py
sqlalchemy.url = postgresql+psycopg://localhost/clipmind

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
