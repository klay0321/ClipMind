name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: clipmind
          POSTGRES_PASSWORD: clipmind
          POSTGRES_DB: clipmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clipmind -d clipmind_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://clipmind:clipmind@localhost:5432/clipmind_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 安装 ffmpeg
        # ffmpeg 传递安装 GLib 运行时，PySceneDetect 的 opencv-python-headless 凭此导入；
        # 不指定发行版相关的 libglib 包名（避免 Debian/Ubuntu t64 改名问题）。
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/shared
          pip install -e "./apps/api[dev]"
          pip install -e "./services/worker[dev]"
      - name: Ruff 静态检查
        run: ruff check packages/shared apps/api services/worker services/embedder
      - name: Pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: 安装依赖
        run: npm ci || npm install
      - name: ESLint
        run: npm run lint
      - name: TypeScript 类型检查
        run: npm run typecheck
      - name: 前端测试
        run: npm test
      - name: 构建
        run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 校验 docker compose 配置
        run: |
          cp .env.example .env
          docker compose config
      - name: 校验 NAS 部署包（compose 配置 + 自包含交付包构建/排除项）
        run: |
          set -o pipefail
          POSTGRES_PASSWORD=ci CLIPMIND_SOURCE_DIR=/tmp/src CLIPMIND_DATA_ROOT=/tmp/cmdata \
            docker compose -f docker-compose.nas.yml config -q
          bash scripts/nas/package.sh | tee pkg.log
          grep -q "RELEASE_PACKAGE_OK" pkg.log
          # 禁含项：真实 .env / node_modules / venv / .git / 视频
          test -z "$(find dist/clipmind-nas -name '.env' -o -name node_modules -o -name '.venv' -o -name '.git' 2>/dev/null)"
          test -z "$(find dist/clipmind-nas -iregex '.*\.\(mp4\|mov\|mkv\)' 2>/dev/null)"
          test -f dist/clipmind-nas/.env.nas.example
          test -f dist/clipmind-nas-release.tar.gz.sha256
          echo "NAS_PACKAGE_E2E_OK"

  # PR-02：云端真实镜像构建 + 全栈端到端（本地 Claude 环境无 apt 网络，无法构建镜像）
  docker-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: 安装 ffmpeg（生成合成测试视频用）
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: 生成合成多场景测试视频到 sample_media（不提交、无公司素材）
        run: |
          ffmpeg -y \
            -f lavfi -i "testsrc=size=320x240:rate=10:duration=2" \
            -f lavfi -i "smptebars=size=320x240:rate=10:duration=2" \
            -f lavfi -i "rgbtestsrc=size=320x240:rate=10:duration=2" \
            -filter_complex "[0:v][1:v][2:v]concat=n=3:v=1[v]" \
            -map "[v]" -c:v libx264 -pix_fmt yuv420p sample_media/ci_demo.mp4
          ls -la sample_media/
      - name: 准备 .env 并构建镜像
        run: |
          cp .env.example .env
          # 用确定性 FakeProvider 让 AI 链路在无真实密钥时也能端到端验证
          echo "AI_PROVIDER=fake" >> .env
          # PR-04：用确定性 FakeEmbedding 让检索文档索引链路水密验证（不下载 torch/模型）
          echo "EMBEDDING_PROVIDER=fake" >> .env
          # PR-05 Gate B：Fake 向量相似度不稳定，置 0 让已索引镜头均成候选，匹配链路可确定性回归
          echo "SCRIPT_MATCH_MIN_SCORE=0.0" >> .env
          # PR-F：视觉识别实验用确定性 FakeVisualProvider（不下载权重、不触 embedder）
          echo "VISUAL_RECOGNITION_ENABLED=true" >> .env
          echo "VISUAL_EMBEDDING_PROVIDER=fake" >> .env
          docker compose build
      - name: 启动全栈
        run: docker compose up -d
      - name: 等待 postgres/redis/api 健康，web/worker/media-worker 运行
        run: |
          for i in $(seq 1 60); do
            api=$(docker compose ps api --format '{{.Health}}')
            pg=$(docker compose ps postgres --format '{{.Health}}')
            rd=$(docker compose ps redis --format '{{.Health}}')
            if [ "$api" = "healthy" ] && [ "$pg" = "healthy" ] && [ "$rd" = "healthy" ]; then
              echo "核心服务健康"; break
            fi
            sleep 3
          done
          docker compose ps
          for svc in web worker media-worker ai-worker search-worker export-worker; do
            state=$(docker compose ps "$svc" --format '{{.State}}')
            echo "$svc: $state"
            [ "$state" = "running" ] || { echo "$svc 未运行"; exit 1; }
          done
      - name: media-worker 中校验 PySceneDetect/OpenCV 真实可用
        run: docker compose exec -T media-worker python -c "import cv2, scenedetect; print('cv2', cv2.__version__, 'scenedetect', scenedetect.__version__)"
      - name: 健康探针
        run: |
          curl -fsS http://localhost:8000/health/live
          curl -fsS http://localhost:8000/health/ready
      - name: 源目录只读（写入必须失败）
        run: |
          if docker compose exec -T api sh -c "touch /app/source/should_fail.txt" 2>/dev/null; then
            echo "源目录可写，违反只读约束"; exit 1
          else
            echo "源目录只读 OK（写入被拒绝）"
          fi
      - name: 运行端到端断言（扫描→分析→镜头→Range→导出→重分析）
        env:
          API_BASE: http://localhost:8000
        run: python scripts/ci_pr02_e2e.py --mode full
      - name: AI 全链路端到端（AI 分析→投影→审核→汇总→筛选；AI_PROVIDER=fake）
        env:
          API_BASE: http://localhost:8000
        run: |
          # 必须确认 ai-worker 在运行并消费 ai 队列，再走真实 AI 链路
          state=$(docker compose ps ai-worker --format '{{.State}}')
          [ "$state" = "running" ] || { echo "ai-worker 未运行: $state"; exit 1; }
          python scripts/ci_ai_e2e.py --mode full
      - name: 检索文档索引端到端（AI/审核后自动重建 + FakeEmbedding 向量；EMBEDDING_PROVIDER=fake）
        env:
          API_BASE: http://localhost:8000
        run: |
          state=$(docker compose ps search-worker --format '{{.State}}')
          [ "$state" = "running" ] || { echo "search-worker 未运行: $state"; exit 1; }
          python scripts/ci_search_e2e.py --mode full
      - name: 混合检索 / 画面描述匹配 端到端（Gate B；FakeProvider + FakeEmbedding）
        env:
          API_BASE: http://localhost:8000
        run: python scripts/ci_hybrid_search_e2e.py --mode full
      - name: 脚本匹配 Gate A 端到端（Fake Parser；创建/幂等/拆段/乐观锁/重排/候选空）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_script_gate_a_e2e.py --mode full | tee script_gate_a.log
          grep -q "SCRIPT_GATE_A_E2E_OK" script_gate_a.log
      - name: 脚本匹配 Gate B 端到端（匹配→选择→锁定→重匹配→剪辑清单→CSV；export-worker）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          state=$(docker compose ps export-worker --format '{{.State}}')
          [ "$state" = "running" ] || { echo "export-worker 未运行: $state"; exit 1; }
          python scripts/ci_script_gate_b_e2e.py --mode full | tee script_gate_b.log
          for flag in SCRIPT_MATCH_E2E_OK SCRIPT_LOCK_E2E_OK SCRIPT_EDIT_LIST_E2E_OK SCRIPT_CSV_E2E_OK; do
            grep -q "$flag" script_gate_b.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 项目/集合 Gate A 端到端（PR-06A；创建/成员/集合/归档守卫/删除安全；合成数据，FakeProvider）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_projects_gate_a_e2e.py --mode full | tee projects_gate_a.log
          for flag in PROJECTS_GATE_A_E2E_OK PROJECTS_ARCHIVE_GUARD_OK COLLECTIONS_GATE_A_E2E_OK PROJECTS_DELETE_SAFETY_OK; do
            grep -q "$flag" projects_gate_a.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 通用产品目录核心 端到端（PR-A1；纯 API/中性合成名；层级/更名/合并重定向/旧 /api/products 兼容）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_a1_catalog_e2e.py --mode full | tee catalog_a1.log
          for flag in GENERIC_CATALOG_COMPAT_OK GENERIC_CATALOG_CRUD_OK GENERIC_CATALOG_RENAME_OK \
                      GENERIC_CATALOG_MERGE_REDIRECT_OK GENERIC_CATALOG_MIGRATION_OK GENERIC_CATALOG_E2E_OK; do
            grep -q "$flag" catalog_a1.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 动态属性 + 参考图库 端到端（PR-A2A；纯 API/中性合成图；全 value_type/上传/去重/旧 API 兼容）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_a2a_e2e.py --mode full | tee a2a.log
          for flag in PR_A2A_DYNAMIC_ATTRIBUTE_OK PR_A2A_REFERENCE_LIBRARY_OK \
                      PR_A2A_NEW_PRODUCT_NO_CODE_CHANGE_OK PR_A2A_LEGACY_PRODUCT_COMPAT_OK PR_A2A_E2E_OK; do
            grep -q "$flag" a2a.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 入驻治理 端到端（PR-A2B；策略/完整度/审核/混淆/变更历史；纯 API 中性数据）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_a2b_e2e.py --mode full | tee a2b.log
          for flag in PR_A2B_READINESS_POLICY_OK PR_A2B_ONBOARDING_WORKFLOW_OK \
                      PR_A2B_CONFUSION_PAIR_OK PR_A2B_CATALOG_REVISION_OK \
                      PR_A2B_NEW_PRODUCT_NO_CODE_CHANGE_OK PR_A2B_E2E_OK; do
            grep -q "$flag" a2b.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 最终成片/使用血缘 端到端（PR-B；上传合成视频→拆镜头→proposal→确认/撤销计数；纯 API 中性数据）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_b_lineage_e2e.py --mode full | tee prb.log
          for flag in PR_B_FINAL_VIDEO_OK PR_B_PROJECT_PROPOSAL_OK PR_B_OCCURRENCES_OK \
                      PR_B_REVOKE_RECOUNT_OK PR_B_USAGE_COUNT_SEMANTICS_OK \
                      PR_B_USAGE_LINEAGE_OK PR_B_BACKWARD_COMPAT_OK PR_B_API_E2E_OK; do
            grep -q "$flag" prb.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 稳定素材身份 端到端（PR-C；指纹→移动 relink→多位置→代次保留；纯 API + 容器内合成文件）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_c_identity_e2e.py --mode full | tee prc.log
          for flag in PR_C_FULL_HASH_AUTHORITY_OK PR_C_STABLE_ASSET_ID_OK PR_C_MOVE_RELINK_OK                       PR_C_HISTORICAL_SHOT_PRESERVED_OK PR_C_CURRENT_GENERATION_FILTER_OK                       PR_C_REANALYSIS_WITH_LINEAGE_OK PR_C_MULTIPLE_LOCATIONS_OK                       PR_C_QUICK_HASH_NOT_AUTHORITATIVE_OK PR_C_BACKWARD_COMPAT_OK PR_C_API_E2E_OK; do
            grep -q "$flag" prc.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 历史使用证据 端到端（PR-C Gate B；受控规则→预览→幂等导入→审核→confirmed 隔离；纯 API 中性数据）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_c_b_legacy_e2e.py --mode full | tee prcb.log
          for flag in PR_C_B_RULE_ENGINE_OK PR_C_B_DRY_RUN_OK PR_C_B_DISTINCT_STATS_OK \n                      PR_C_B_IMPORT_OK PR_C_B_IMPORT_IDEMPOTENT_OK PR_C_B_REVIEW_WORKFLOW_OK \n                      PR_C_B_LEGACY_STATE_OK PR_C_B_USAGE_COUNT_UNCHANGED_OK PR_C_B_USAGE_ISOLATION_OK \n                      PR_C_B_LOCATION_HISTORY_OK PR_C_B_IMMUTABLE_RULE_SNAPSHOT_OK \n                      PR_C_B_RULE_VERSIONED_EVIDENCE_OK PR_C_B_IMPORT_SERIALIZATION_OK \n                      PR_C_B_IMPORT_CANCEL_OK PR_C_B_BACKWARD_COMPAT_OK PR_C_B_API_E2E_OK; do
            grep -q "$flag" prcb.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 使用感知检索 端到端（PR-E；中性排名基准：空查询浏览 base 全 0 + 时间窗隔离；先于 PR-D 的全库快照）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_e_usage_search_e2e.py --mode full | tee pre.log
          for flag in PR_E_USAGE_FEATURE_PROJECTION_OK PR_E_DEFAULT_RANKING_PARITY_OK \
                      PR_E_PREFER_UNUSED_OK PR_E_RELEVANCE_GUARD_OK PR_E_HARD_FILTER_OK \
                      PR_E_CANDIDATE_EXPANSION_OK PR_E_LEGACY_WEIGHT_ISOLATION_OK \
                      PR_E_BACKWARD_COMPAT_OK PR_E_API_E2E_OK; do
            grep -q "$flag" pre.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 检索顺序确定性 端到端（PR-E.1；20 连发逐位断言 + 分页/parity；造 usage 故须先于 PR-D 快照）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_e1_search_determinism_e2e.py --mode full | tee pre1.log
          for flag in PR_E1_LEXICAL_ORDER_OK PR_E1_VECTOR_ORDER_OK PR_E1_HYBRID_ORDER_OK \
                      PR_E1_USAGE_ORDER_OK PR_E1_PAGINATION_OK PR_E1_DEFAULT_PARITY_OK \
                      PR_E1_API_E2E_OK; do
            grep -q "$flag" pre1.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 产品视觉识别实验 端到端（PR-F；FakeVisualProvider + 合成 PNG；候选零绑定）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_f_visual_e2e.py --mode full | tee prf.log
          for flag in PR_F_PROVIDER_ABSTRACTION_OK PR_F_REFERENCE_ELIGIBILITY_OK                       PR_F_VISUAL_CANDIDATE_OK PR_F_OPEN_SET_OK PR_F_AMBIGUITY_GUARD_OK                       PR_F_CONFUSION_PAIR_OK PR_F_NO_AUTO_BIND_OK                       PR_F_BACKWARD_COMPAT_OK PR_F_API_E2E_OK; do
            grep -q "$flag" prf.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 产品素材工作台 端到端（PM；图片素材+正式关系+批量+继承/覆盖+产品搜索）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_product_media_e2e.py --mode full | tee pma.log
          for flag in PRODUCT_MEDIA_MANUAL_ASSIGNMENT_OK PRODUCT_MEDIA_BULK_ASSIGNMENT_OK                       PRODUCT_MEDIA_SHOT_INHERITANCE_OK PRODUCT_MEDIA_SHOT_OVERRIDE_OK                       PRODUCT_MEDIA_PRODUCT_VIEW_OK PRODUCT_MEDIA_SEARCH_FILTER_OK                       PRODUCT_MEDIA_VISUAL_SUGGESTION_OK PRODUCT_MEDIA_NO_AI_REQUIRED_OK                       PRODUCT_MEDIA_API_E2E_OK; do
            grep -q "$flag" pma.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 产品素材运营效率 端到端（OPS；分组审核→批量→撤销→审计）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_product_media_ops_e2e.py --mode full | tee pops.log
          for flag in POPS_GROUPED_QUEUE_OK POPS_GROUP_CONFIRM_OK POPS_COVERAGE_OK                       POPS_UNDO_OK POPS_AUDIT_OK POPS_API_E2E_OK; do
            grep -q "$flag" pops.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 统一使用记录中心 端到端（PR-D；Read Model→typed bulk→clue 补录→隔离；置于 PR-E 之后——其全库 usage 行数快照须为重启前最后写入）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_d_usage_review_e2e.py --mode full | tee prd.log
          for flag in PR_D_UNIFIED_READ_MODEL_OK PR_D_FORMAL_BULK_REVIEW_OK                       PR_D_LEGACY_BULK_REVIEW_OK PR_D_MIXED_TYPE_GUARD_OK                       PR_D_MANUAL_LINEAGE_FROM_CLUE_OK PR_D_USAGE_COUNT_ISOLATION_OK                       PR_D_BACKWARD_COMPAT_OK PR_D_API_E2E_OK; do
            grep -q "$flag" prd.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 导出中心/多格式/Bundle/保存搜索/收藏/动态集合 端到端（PR-06B；FakeProvider；export+media worker）
        env:
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr06b_e2e.py --mode full | tee pr06b.log
          for flag in MULTI_FORMAT_EXPORT_E2E_OK BUNDLE_EXPORT_E2E_OK EXPORT_CENTER_E2E_OK \
                      EXPORT_DELETE_SAFETY_E2E_OK SAVED_SEARCH_E2E_OK FAVORITE_E2E_OK \
                      DYNAMIC_COLLECTION_E2E_OK PR06B_E2E_OK; do
            grep -q "$flag" pr06b.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: 已有数据库升级路径端到端（0008→head 含 0009-0018 + 幂等；独立测试库，不碰业务库）
        run: |
          set -o pipefail
          python scripts/ci_db_upgrade_e2e.py | tee db_upgrade.log
          grep -q "SCRIPT_DB_UPGRADE_OK" db_upgrade.log
          grep -q "PROJECTS_DB_UPGRADE_OK" db_upgrade.log
          grep -q "EXPORT_CENTER_DB_UPGRADE_OK" db_upgrade.log
          grep -q "CATALOG_DB_UPGRADE_OK" db_upgrade.log
          grep -q "ATTR_REF_DB_UPGRADE_OK" db_upgrade.log
          grep -q "GOVERNANCE_DB_UPGRADE_OK" db_upgrade.log
          grep -q "LINEAGE_DB_UPGRADE_OK" db_upgrade.log
          grep -q "IDENTITY_DB_UPGRADE_OK" db_upgrade.log
          grep -q "LEGACY_DB_UPGRADE_OK" db_upgrade.log
          grep -q "SCRIPT_DB_UPGRADE_IDEMPOTENT_OK" db_upgrade.log
      - name: AI 链路 DB 级持久化断言（不以 Celery task 自报成功为准）
        run: |
          q() { docker compose exec -T postgres psql -U clipmind -d clipmind -tAc "$1"; }
          runs=$(q "select count(*) from ai_analysis_run where status='completed'")
          shots=$(q "select count(*) from ai_shot_analysis where status='completed'")
          tags=$(q "select count(*) from shot_tag where active")
          revs=$(q "select count(*) from shot_review_state where review_status in ('confirmed','modified')")
          docs=$(q "select count(*) from shot_search_document where embedding_status='completed' and embedding is not null")
          echo "completed_runs=$runs ai_shot=$shots active_shot_tag=$tags reviewed=$revs search_docs=$docs"
          [ "${runs:-0}" -ge 1 ] || { echo "ai_analysis_run 未持久化为 completed"; exit 1; }
          [ "${shots:-0}" -ge 1 ] || { echo "ai_shot_analysis 未持久化"; exit 1; }
          [ "${tags:-0}" -ge 1 ] || { echo "shot_tag 投影未持久化"; exit 1; }
          [ "${revs:-0}" -ge 1 ] || { echo "shot_review_state 未持久化"; exit 1; }
          [ "${docs:-0}" -ge 1 ] || { echo "shot_search_document 未持久化（含向量）"; exit 1; }
      - name: 重启服务并校验记录持久化（含 AI 链路）
        env:
          API_BASE: http://localhost:8000
        run: |
          docker compose restart api worker media-worker ai-worker search-worker export-worker
          for i in $(seq 1 40); do
            [ "$(docker compose ps api --format '{{.Health}}')" = "healthy" ] && break
            sleep 3
          done
          python scripts/ci_pr02_e2e.py --mode check-persist
          python scripts/ci_ai_e2e.py --mode check-persist
          python scripts/ci_search_e2e.py --mode check-persist
          python scripts/ci_hybrid_search_e2e.py --mode check-persist
          set -o pipefail
          python scripts/ci_script_gate_a_e2e.py --mode check-persist | tee script_gate_a_persist.log
          grep -q "SCRIPT_GATE_A_PERSIST_OK" script_gate_a_persist.log
          python scripts/ci_script_gate_b_e2e.py --mode check-persist | tee script_gate_b_persist.log
          grep -q "SCRIPT_GATE_B_PERSIST_OK" script_gate_b_persist.log
          python scripts/ci_projects_gate_a_e2e.py --mode check-persist | tee projects_gate_a_persist.log
          grep -q "PROJECTS_GATE_A_PERSIST_OK" projects_gate_a_persist.log
          python scripts/ci_pr06b_e2e.py --mode check-persist | tee pr06b_persist.log
          grep -q "PR06B_PERSIST_OK" pr06b_persist.log
          python scripts/ci_pr_a1_catalog_e2e.py --mode check-persist | tee catalog_a1_persist.log
          grep -q "GENERIC_CATALOG_PERSIST_OK" catalog_a1_persist.log
          python scripts/ci_pr_a2a_e2e.py --mode check-persist | tee a2a_persist.log
          grep -q "PR_A2A_RESTART_PERSIST_OK" a2a_persist.log
          python scripts/ci_pr_a2b_e2e.py --mode check-persist | tee a2b_persist.log
          grep -q "PR_A2B_RESTART_PERSIST_OK" a2b_persist.log
          python scripts/ci_pr_b_lineage_e2e.py --mode check-persist | tee prb_persist.log
          grep -q "PR_B_RESTART_PERSIST_OK" prb_persist.log
          grep -q "PR_B_PERSIST_OK" prb_persist.log
          python scripts/ci_pr_c_identity_e2e.py --mode check-persist | tee prc_persist.log
          grep -q "PR_C_RESTART_PERSIST_OK" prc_persist.log
          grep -q "PR_C_PERSIST_OK" prc_persist.log
          python scripts/ci_pr_c_b_legacy_e2e.py --mode check-persist | tee prcb_persist.log
          grep -q "PR_C_B_RESTART_PERSIST_OK" prcb_persist.log
          python scripts/ci_pr_d_usage_review_e2e.py --mode check-persist | tee prd_persist.log
          grep -q "PR_D_RESTART_PERSIST_OK" prd_persist.log
          python scripts/ci_pr_e_usage_search_e2e.py --mode check-persist | tee pre_persist.log
          grep -q "PR_E_SAVED_SEARCH_PERSIST_OK" pre_persist.log
          grep -q "PR_E_RESTART_PERSIST_OK" pre_persist.log
          python scripts/ci_pr_e1_search_determinism_e2e.py --mode check-persist | tee pre1_persist.log
          grep -q "PR_E1_RESTART_DETERMINISM_OK" pre1_persist.log
          python scripts/ci_pr_f_visual_e2e.py --mode check-persist | tee prf_persist.log
          grep -q "PR_F_RESTART_PERSIST_OK" prf_persist.log
          python scripts/ci_product_media_e2e.py --mode check-persist | tee pma_persist.log
          grep -q "PRODUCT_MEDIA_RESTART_PERSIST_OK" pma_persist.log
          python scripts/ci_product_media_ops_e2e.py --mode check-persist | tee pops_persist.log
          grep -q "POPS_RESTART_PERSIST_OK" pops_persist.log
      - name: 失败时收集日志（脱敏：不输出 env / key）
        if: failure()
        run: |
          echo "===== compose ps ====="; docker compose ps
          echo "===== migrate logs ====="; docker compose logs migrate || true
          echo "===== api logs ====="; docker compose logs api || true
          echo "===== worker logs ====="; docker compose logs worker || true
          echo "===== media-worker logs ====="; docker compose logs media-worker || true
          echo "===== ai-worker logs ====="; docker compose logs ai-worker || true
          echo "===== search-worker logs ====="; docker compose logs search-worker || true
          echo "===== export-worker logs ====="; docker compose logs export-worker || true
          echo "===== postgres logs ====="; docker compose logs postgres || true
          echo "===== AI / 检索链路计数 ====="
          docker compose exec -T postgres psql -U clipmind -d clipmind -tAc "select 'run:'||status, count(*) from ai_analysis_run group by status; select 'ai_shot', count(*) from ai_shot_analysis; select 'shot_tag_active', count(*) from shot_tag where active; select 'review:'||review_status, count(*) from shot_review_state group by review_status; select 'searchdoc_emb:'||embedding_status, count(*) from shot_search_document group by embedding_status; select 'searchdoc_doc:'||document_status, count(*) from shot_search_document group by document_status;" || true
      - name: 清理
        if: always()
        run: docker compose down -v

  # PR-04 Gate C：FakeProvider + FakeEmbedding 下的**真实页面** UI E2E（Playwright Chromium）。
  # 仅运行 e2e/search-ui.spec.ts（provider 无关）；e2e/real-provider.spec.ts 受 RUN_REAL_PROVIDER_E2E
  # 门禁，绝不在此运行 → 普通 CI 不接触真实 MiMo Key、不启动真实 embedder、不下载 sentence-transformers 模型。
  ui-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: 安装 ffmpeg（生成合成测试视频用）
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: 生成合成多场景测试视频（不提交、无公司素材）
        run: |
          ffmpeg -y \
            -f lavfi -i "testsrc=size=360x640:rate=10:duration=2" \
            -f lavfi -i "smptebars=size=360x640:rate=10:duration=2" \
            -filter_complex "[0:v][1:v]concat=n=2:v=1[v]" \
            -map "[v]" -c:v libx264 -pix_fmt yuv420p sample_media/ci_demo.mp4
      - name: 准备 .env（FakeProvider + FakeEmbedding；无真实 Key、无 embedder、不下载模型）
        run: |
          cp .env.example .env
          echo "AI_PROVIDER=fake" >> .env
          echo "EMBEDDING_PROVIDER=fake" >> .env
          # Gate C 脚本匹配：Fake 向量相似度不稳定，置 0 让已索引镜头均成候选
          echo "SCRIPT_MATCH_MIN_SCORE=0.0" >> .env
          # PR-F：视觉识别实验（FakeVisualProvider，不下载权重）
          echo "VISUAL_RECOGNITION_ENABLED=true" >> .env
          echo "VISUAL_EMBEDDING_PROVIDER=fake" >> .env
      - name: 构建并启动全栈
        run: |
          docker compose build
          docker compose up -d
      - name: 等待核心服务健康 + web 可访问
        run: |
          for i in $(seq 1 60); do
            api=$(docker compose ps api --format '{{.Health}}')
            pg=$(docker compose ps postgres --format '{{.Health}}')
            rd=$(docker compose ps redis --format '{{.Health}}')
            if [ "$api" = "healthy" ] && [ "$pg" = "healthy" ] && [ "$rd" = "healthy" ]; then
              echo "核心服务健康"; break
            fi
            sleep 3
          done
          docker compose ps
          for svc in web search-worker; do
            state=$(docker compose ps "$svc" --format '{{.State}}')
            [ "$svc" = "running" ] || [ "$state" = "running" ] || { echo "$svc 未运行: $state"; exit 1; }
          done
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3000/assets >/dev/null 2>&1 && { echo "web 可访问"; break; }
            sleep 2
          done
      - name: 播种 Gate C 数据（扫描→拆镜头→AI fake→产品→审核→FakeEmbedding 索引）
        env:
          API_BASE: http://localhost:8000
        run: |
          state=$(docker compose ps search-worker --format '{{.State}}')
          [ "$state" = "running" ] || { echo "search-worker 未运行: $state"; exit 1; }
          python scripts/gate_c_e2e_seed.py
          for i in $(seq 1 40); do
            n=$(curl -s http://localhost:8000/api/search/index/status \
                 | python -c "import sys,json;print(json.load(sys.stdin)['completed_embeddings'])" 2>/dev/null || echo 0)
            echo "completed_embeddings=$n"
            [ "${n:-0}" -ge 1 ] && break
            sleep 3
          done
      - name: 安装 Playwright Chromium（仅 chromium，不装全部浏览器）
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Fake UI E2E（真实 /search 页面；仅 search-ui.spec.ts，real-provider 受门禁不运行）
        working-directory: e2e
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          npx playwright test search-ui.spec.ts --grep-invert @persist | tee ui.log
          grep -q "SEARCH_UI_E2E_OK" ui.log
          grep -q "DESCRIPTION_MATCH_UI_E2E_OK" ui.log
      - name: Gate C 脚本匹配 UI E2E（真实 /script 页面；创建→拆段→匹配→选择锁定→剪辑清单→CSV）
        working-directory: e2e
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          state=$(docker compose --project-directory .. ps export-worker --format '{{.State}}')
          [ "$state" = "running" ] || { echo "export-worker 未运行: $state"; exit 1; }
          npx playwright test script-ui.spec.ts --grep-invert @persist | tee script-ui.log
          for flag in SCRIPT_UI_E2E_OK SCRIPT_CANDIDATE_UI_E2E_OK SCRIPT_LOCK_UI_E2E_OK SCRIPT_EDIT_LIST_UI_E2E_OK SCRIPT_CSV_UI_E2E_OK; do
            grep -q "$flag" script-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-06A 项目/集合 UI E2E（真实页面：创建→成员→集合→归档只读→删除安全；合成数据）
        working-directory: e2e
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          npx playwright test projects-ui.spec.ts --grep-invert @persist | tee projects-ui.log
          for flag in PROJECTS_UI_E2E_OK PROJECTS_MEMBERS_UI_E2E_OK COLLECTIONS_UI_E2E_OK PROJECTS_ARCHIVE_UI_E2E_OK PROJECTS_DELETE_SAFETY_UI_E2E_OK; do
            grep -q "$flag" projects-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-06B 导出中心/多格式/收藏/保存搜索/动态集合 UI E2E（真实页面；合成数据）
        working-directory: e2e
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          npx playwright test pr06b-ui.spec.ts --grep-invert @persist | tee pr06b-ui.log
          grep -q "PR06B_UI_E2E_OK" pr06b-ui.log || { echo "缺少标志 PR06B_UI_E2E_OK"; exit 1; }
      - name: 核心产品 UX E2E（跨页结构/导航/响应式无溢出/媒体兜底；真实页面）
        working-directory: e2e
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          npx playwright test core-product-ux.spec.ts --grep-invert @persist | tee core-ux.log
          for flag in CORE_UX_ASSETS_E2E_OK CORE_UX_SHOTS_E2E_OK CORE_UX_DESCRIPTION_MATCH_E2E_OK CORE_UX_SCRIPT_E2E_OK CORE_UX_AUXILIARY_PAGES_E2E_OK CORE_UX_NAV_E2E_OK CORE_UX_RESPONSIVE_E2E_OK CORE_UX_MEDIA_FALLBACK_E2E_OK; do
            grep -q "$flag" core-ux.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-A1 通用产品目录 UI E2E（真实页面：四层创建/激活/别名/更名/旧名/归档恢复/子级合并守卫）
        working-directory: e2e
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          npx playwright test pr-a1-product-catalog.spec.ts --grep-invert @persist | tee pr-a1-ui.log
          for flag in PR_A1_UI_ALL_LEVEL_ACTIVATE_OK PR_A1_UI_RENAME_OLDNAME_OK PR_A1_UI_CHILD_MERGE_GUARD_OK PR_A1_UI_SCOPED_CODE_OK PR_A1_UI_E2E_OK; do
            grep -q "$flag" pr-a1-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-A2 动态属性 + 参考图库 UI E2E（真实页面：属性定义/填值/上传/角度/主图/诚实声明/刷新持久化）
        working-directory: e2e
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          npx playwright test pr-a2a-attributes-references.spec.ts --grep-invert @persist | tee pr-a2a-ui.log
          for flag in PR_A2A_UI_ATTRIBUTE_OK PR_A2A_UI_REFERENCE_OK PR_A2A_UI_E2E_OK; do
            grep -q "$flag" pr-a2a-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-A2B 入驻治理 UI E2E（真实页面：完整度/提交批准/混淆关系/变更历史/刷新持久化）
        working-directory: e2e
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          npx playwright test pr-a2b-onboarding.spec.ts --grep-invert @persist | tee pr-a2b-ui.log
          for flag in PR_A2B_UI_READINESS_OK PR_A2B_UI_ONBOARDING_OK PR_A2B_UI_CONFUSION_OK PR_A2B_UI_REVISION_OK PR_A2B_UI_E2E_OK; do
            grep -q "$flag" pr-a2b-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-B 成片与使用血缘 UI E2E（真实页面：登记成片/候选确认/统计/归档守卫）
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          # 播种第二个 Asset（成片文件须与来源镜头素材不同；仅 gate_c 单素材栈会缺）
          python scripts/ci_pr_b_lineage_e2e.py --mode seed-ui | tee prb-ui-seed.log
          grep -q "PR_B_UI_SEED_OK" prb-ui-seed.log
          cd e2e
          npx playwright test pr-b-final-video-lineage.spec.ts --grep-invert @persist | tee pr-b-ui.log
          for flag in PR_B_UI_FINAL_VIDEO_OK PR_B_UI_CONFIRM_OK PR_B_UI_USAGE_COUNT_OK PR_B_UI_ARCHIVE_GUARD_OK PR_B_UI_E2E_OK; do
            grep -q "$flag" pr-b-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-C 素材身份 UI E2E（先 API 播种移动/代次数据，再驱动真实页面）
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_c_identity_e2e.py --mode full | tee prc-ui-seed.log
          grep -q "PR_C_API_E2E_OK" prc-ui-seed.log
          cd e2e
          npx playwright test pr-c-asset-identity.spec.ts --grep-invert @persist | tee pr-c-ui.log
          for flag in PR_C_UI_IDENTITY_OK PR_C_UI_LOCATIONS_OK PR_C_UI_GENERATIONS_OK PR_C_UI_E2E_OK; do
            grep -q "$flag" pr-c-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-C Gate B 历史使用证据 UI E2E（先 API 播种规则/证据，再驱动真实页面）
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_c_b_legacy_e2e.py --mode full | tee prcb-ui-seed.log
          grep -q "PR_C_B_API_E2E_OK" prcb-ui-seed.log
          cd e2e
          npx playwright test pr-c-b-legacy-evidence.spec.ts --grep-invert @persist | tee pr-c-b-ui.log
          for flag in PR_C_B_UI_RULES_OK PR_C_B_UI_IMPORT_OK PR_C_B_UI_REVIEW_OK PR_C_B_UI_E2E_OK; do
            grep -q "$flag" pr-c-b-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-D 统一使用记录中心 UI E2E（先 API 播种，再驱动真实页面）
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_d_usage_review_e2e.py --mode seed-ui | tee prd-ui-seed.log
          grep -q "PR_D_UI_SEED_OK" prd-ui-seed.log
          cd e2e
          npx playwright test pr-d-usage-review.spec.ts --grep-invert @persist | tee pr-d-ui.log
          for flag in PR_D_UI_READ_MODEL_OK PR_D_UI_MIXED_GUARD_OK PR_D_UI_LEGACY_BULK_OK                       PR_D_UI_FORMAL_REVIEW_OK PR_D_UI_CLUE_OK PR_D_UI_E2E_OK; do
            grep -q "$flag" pr-d-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-E 使用感知检索 UI E2E（先 API 全流程播种，再驱动真实页面）
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_e_usage_search_e2e.py --mode full | tee pre-ui-seed.log
          grep -q "PR_E_API_E2E_OK" pre-ui-seed.log
          cd e2e
          npx playwright test pr-e-usage-search.spec.ts --grep-invert @persist | tee pr-e-ui.log
          for flag in PR_E_UI_E2E_OK PR_E_UI_EXPLANATION_OK; do
            grep -q "$flag" pr-e-ui.log || { echo "缺少标志 $flag"; exit 1; }
          done
      - name: PR-F 视觉识别实验 UI E2E（先 API 播种，再驱动真实页面）
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_pr_f_visual_e2e.py --mode full | tee prf-ui-seed.log
          grep -q "PR_F_API_E2E_OK" prf-ui-seed.log
          cd e2e
          npx playwright test pr-f-visual-experiments.spec.ts --grep-invert @persist | tee pr-f-ui.log
          grep -q "PR_F_UI_E2E_OK" pr-f-ui.log
      - name: PM 产品素材库 UI E2E（先 API 播种，再驱动真实页面）
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_product_media_e2e.py --mode full | tee pma-ui-seed.log
          grep -q "PRODUCT_MEDIA_API_E2E_OK" pma-ui-seed.log
          cd e2e
          npx playwright test pr-media-workspace.spec.ts --grep-invert @persist | tee pm-ui.log
          grep -q "PM_UI_E2E_OK" pm-ui.log
      - name: OPS 分组审核 UI E2E
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          python scripts/ci_product_media_ops_e2e.py --mode cleanup
          python scripts/ci_product_media_ops_e2e.py --mode full | tee pops-ui-seed.log
          grep -q "POPS_API_E2E_OK" pops-ui-seed.log
          cd e2e
          npx playwright test pr-media-ops.spec.ts --grep-invert @persist | tee pm-ops-ui.log
          grep -q "POPS_UI_E2E_OK" pm-ops-ui.log
      - name: 重启 API/web/search-worker/export-worker 后持久化
        env:
          WEB_BASE: http://localhost:3000
          API_BASE: http://localhost:8000
        run: |
          set -o pipefail
          docker compose restart api web search-worker export-worker
          for i in $(seq 1 40); do
            [ "$(docker compose ps api --format '{{.Health}}')" = "healthy" ] && break
            sleep 3
          done
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3000/assets >/dev/null 2>&1 && break
            sleep 2
          done
          ( cd e2e && npx playwright test search-ui.spec.ts --grep @persist | tee persist.log )
          grep -q "SEARCH_UI_PERSIST_OK" e2e/persist.log
          ( cd e2e && npx playwright test script-ui.spec.ts --grep @persist | tee script-persist.log )
          grep -q "SCRIPT_UI_PERSIST_OK" e2e/script-persist.log
          ( cd e2e && npx playwright test projects-ui.spec.ts --grep @persist | tee projects-persist.log )
          grep -q "PROJECTS_UI_PERSIST_OK" e2e/projects-persist.log
          ( cd e2e && npx playwright test pr06b-ui.spec.ts --grep @persist | tee pr06b-persist.log )
          grep -q "PR06B_UI_PERSIST_OK" e2e/pr06b-persist.log
          ( cd e2e && npx playwright test core-product-ux.spec.ts --grep @persist | tee core-persist.log )
          grep -q "CORE_UX_PERSIST_OK" e2e/core-persist.log
          ( cd e2e && npx playwright test pr-a1-product-catalog.spec.ts --grep @persist | tee pr-a1-persist.log )
          grep -q "PR_A1_UI_PERSIST_OK" e2e/pr-a1-persist.log
          ( cd e2e && npx playwright test pr-a2a-attributes-references.spec.ts --grep @persist | tee pr-a2a-persist.log )
          grep -q "PR_A2A_UI_PERSIST_OK" e2e/pr-a2a-persist.log
          ( cd e2e && npx playwright test pr-a2b-onboarding.spec.ts --grep @persist | tee pr-a2b-persist.log )
          grep -q "PR_A2B_UI_PERSIST_OK" e2e/pr-a2b-persist.log
          ( cd e2e && npx playwright test pr-b-final-video-lineage.spec.ts --grep @persist | tee pr-b-persist.log )
          grep -q "PR_B_UI_PERSIST_OK" e2e/pr-b-persist.log
          ( cd e2e && npx playwright test pr-c-asset-identity.spec.ts --grep @persist | tee pr-c-persist.log )
          grep -q "PR_C_UI_PERSIST_OK" e2e/pr-c-persist.log
          ( cd e2e && npx playwright test pr-c-b-legacy-evidence.spec.ts --grep @persist | tee pr-c-b-persist.log )
          grep -q "PR_C_B_UI_PERSIST_OK" e2e/pr-c-b-persist.log
          ( cd e2e && npx playwright test pr-d-usage-review.spec.ts --grep @persist | tee pr-d-persist.log )
          grep -q "PR_D_UI_PERSIST_OK" e2e/pr-d-persist.log
          ( cd e2e && npx playwright test pr-e-usage-search.spec.ts --grep @persist | tee pr-e-persist.log )
          grep -q "PR_E_UI_PERSIST_OK" e2e/pr-e-persist.log
          ( cd e2e && npx playwright test pr-f-visual-experiments.spec.ts --grep @persist | tee pr-f-persist.log )
          grep -q "PR_F_UI_PERSIST_OK" e2e/pr-f-persist.log
          ( cd e2e && npx playwright test pr-media-workspace.spec.ts --grep @persist | tee pm-persist.log )
          grep -q "PM_UI_PERSIST_OK" e2e/pm-persist.log
          ( cd e2e && npx playwright test pr-media-ops.spec.ts --grep @persist | tee pm-ops-persist.log )
          grep -q "POPS_UI_PERSIST_OK" e2e/pm-ops-persist.log
      - name: 失败时上传脱敏证据（trace/截图/报告；不含 .env/key/endpoint）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-artifacts
          path: |
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: ignore
      - name: 清理
        if: always()
        run: docker compose down -v
