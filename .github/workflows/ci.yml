name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: clipmind
          POSTGRES_PASSWORD: clipmind
          POSTGRES_DB: clipmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clipmind -d clipmind_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://clipmind:clipmind@localhost:5432/clipmind_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 安装 ffmpeg
        # ffmpeg 传递安装 GLib 运行时，PySceneDetect 的 opencv-python-headless 凭此导入；
        # 不指定发行版相关的 libglib 包名（避免 Debian/Ubuntu t64 改名问题）。
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/shared
          pip install -e "./apps/api[dev]"
          pip install -e "./services/worker[dev]"
      - name: Ruff 静态检查
        run: ruff check packages/shared apps/api services/worker services/embedder
      - name: Pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: 安装依赖
        run: npm ci || npm install
      - name: ESLint
        run: npm run lint
      - name: TypeScript 类型检查
        run: npm run typecheck
      - name: 前端测试
        run: npm test
      - name: 构建
        run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 校验 docker compose 配置
        run: |
          cp .env.example .env
          docker compose config

  # PR-02：云端真实镜像构建 + 全栈端到端（本地 Claude 环境无 apt 网络，无法构建镜像）
  docker-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: 安装 ffmpeg（生成合成测试视频用）
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: 生成合成多场景测试视频到 sample_media（不提交、无公司素材）
        run: |
          ffmpeg -y \
            -f lavfi -i "testsrc=size=320x240:rate=10:duration=2" \
            -f lavfi -i "smptebars=size=320x240:rate=10:duration=2" \
            -f lavfi -i "rgbtestsrc=size=320x240:rate=10:duration=2" \
            -filter_complex "[0:v][1:v][2:v]concat=n=3:v=1[v]" \
            -map "[v]" -c:v libx264 -pix_fmt yuv420p sample_media/ci_demo.mp4
          ls -la sample_media/
      - name: 准备 .env 并构建镜像
        run: |
          cp .env.example .env
          # 用确定性 FakeProvider 让 AI 链路在无真实密钥时也能端到端验证
          echo "AI_PROVIDER=fake" >> .env
          # PR-04：用确定性 FakeEmbedding 让检索文档索引链路水密验证（不下载 torch/模型）
          echo "EMBEDDING_PROVIDER=fake" >> .env
          docker compose build
      - name: 启动全栈
        run: docker compose up -d
      - name: 等待 postgres/redis/api 健康，web/worker/media-worker 运行
        run: |
          for i in $(seq 1 60); do
            api=$(docker compose ps api --format '{{.Health}}')
            pg=$(docker compose ps postgres --format '{{.Health}}')
            rd=$(docker compose ps redis --format '{{.Health}}')
            if [ "$api" = "healthy" ] && [ "$pg" = "healthy" ] && [ "$rd" = "healthy" ]; then
              echo "核心服务健康"; break
            fi
            sleep 3
          done
          docker compose ps
          for svc in web worker media-worker ai-worker search-worker; do
            state=$(docker compose ps "$svc" --format '{{.State}}')
            echo "$svc: $state"
            [ "$state" = "running" ] || { echo "$svc 未运行"; exit 1; }
          done
      - name: media-worker 中校验 PySceneDetect/OpenCV 真实可用
        run: docker compose exec -T media-worker python -c "import cv2, scenedetect; print('cv2', cv2.__version__, 'scenedetect', scenedetect.__version__)"
      - name: 健康探针
        run: |
          curl -fsS http://localhost:8000/health/live
          curl -fsS http://localhost:8000/health/ready
      - name: 源目录只读（写入必须失败）
        run: |
          if docker compose exec -T api sh -c "touch /app/source/should_fail.txt" 2>/dev/null; then
            echo "源目录可写，违反只读约束"; exit 1
          else
            echo "源目录只读 OK（写入被拒绝）"
          fi
      - name: 运行端到端断言（扫描→分析→镜头→Range→导出→重分析）
        env:
          API_BASE: http://localhost:8000
        run: python scripts/ci_pr02_e2e.py --mode full
      - name: AI 全链路端到端（AI 分析→投影→审核→汇总→筛选；AI_PROVIDER=fake）
        env:
          API_BASE: http://localhost:8000
        run: |
          # 必须确认 ai-worker 在运行并消费 ai 队列，再走真实 AI 链路
          state=$(docker compose ps ai-worker --format '{{.State}}')
          [ "$state" = "running" ] || { echo "ai-worker 未运行: $state"; exit 1; }
          python scripts/ci_ai_e2e.py --mode full
      - name: 检索文档索引端到端（AI/审核后自动重建 + FakeEmbedding 向量；EMBEDDING_PROVIDER=fake）
        env:
          API_BASE: http://localhost:8000
        run: |
          state=$(docker compose ps search-worker --format '{{.State}}')
          [ "$state" = "running" ] || { echo "search-worker 未运行: $state"; exit 1; }
          python scripts/ci_search_e2e.py --mode full
      - name: 混合检索 / 画面描述匹配 端到端（Gate B；FakeProvider + FakeEmbedding）
        env:
          API_BASE: http://localhost:8000
        run: python scripts/ci_hybrid_search_e2e.py --mode full
      - name: AI 链路 DB 级持久化断言（不以 Celery task 自报成功为准）
        run: |
          q() { docker compose exec -T postgres psql -U clipmind -d clipmind -tAc "$1"; }
          runs=$(q "select count(*) from ai_analysis_run where status='completed'")
          shots=$(q "select count(*) from ai_shot_analysis where status='completed'")
          tags=$(q "select count(*) from shot_tag where active")
          revs=$(q "select count(*) from shot_review_state where review_status in ('confirmed','modified')")
          docs=$(q "select count(*) from shot_search_document where embedding_status='completed' and embedding is not null")
          echo "completed_runs=$runs ai_shot=$shots active_shot_tag=$tags reviewed=$revs search_docs=$docs"
          [ "${runs:-0}" -ge 1 ] || { echo "ai_analysis_run 未持久化为 completed"; exit 1; }
          [ "${shots:-0}" -ge 1 ] || { echo "ai_shot_analysis 未持久化"; exit 1; }
          [ "${tags:-0}" -ge 1 ] || { echo "shot_tag 投影未持久化"; exit 1; }
          [ "${revs:-0}" -ge 1 ] || { echo "shot_review_state 未持久化"; exit 1; }
          [ "${docs:-0}" -ge 1 ] || { echo "shot_search_document 未持久化（含向量）"; exit 1; }
      - name: 重启服务并校验记录持久化（含 AI 链路）
        env:
          API_BASE: http://localhost:8000
        run: |
          docker compose restart api worker media-worker ai-worker search-worker
          for i in $(seq 1 40); do
            [ "$(docker compose ps api --format '{{.Health}}')" = "healthy" ] && break
            sleep 3
          done
          python scripts/ci_pr02_e2e.py --mode check-persist
          python scripts/ci_ai_e2e.py --mode check-persist
          python scripts/ci_search_e2e.py --mode check-persist
          python scripts/ci_hybrid_search_e2e.py --mode check-persist
      - name: 失败时收集日志（脱敏：不输出 env / key）
        if: failure()
        run: |
          echo "===== compose ps ====="; docker compose ps
          echo "===== migrate logs ====="; docker compose logs migrate || true
          echo "===== api logs ====="; docker compose logs api || true
          echo "===== worker logs ====="; docker compose logs worker || true
          echo "===== media-worker logs ====="; docker compose logs media-worker || true
          echo "===== ai-worker logs ====="; docker compose logs ai-worker || true
          echo "===== search-worker logs ====="; docker compose logs search-worker || true
          echo "===== postgres logs ====="; docker compose logs postgres || true
          echo "===== AI / 检索链路计数 ====="
          docker compose exec -T postgres psql -U clipmind -d clipmind -tAc "select 'run:'||status, count(*) from ai_analysis_run group by status; select 'ai_shot', count(*) from ai_shot_analysis; select 'shot_tag_active', count(*) from shot_tag where active; select 'review:'||review_status, count(*) from shot_review_state group by review_status; select 'searchdoc_emb:'||embedding_status, count(*) from shot_search_document group by embedding_status; select 'searchdoc_doc:'||document_status, count(*) from shot_search_document group by document_status;" || true
      - name: 清理
        if: always()
        run: docker compose down -v
