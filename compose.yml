name: clipmind

# ClipMind —— 默认 10 服务：postgres / redis / migrate / api / worker / media-worker /
# ai-worker / search-worker / export-worker / web（+ 可选 embedder，profile "embedding"）。
# 项目根执行：docker compose up -d
# 源目录只读挂载到 /app/source；派生数据可读写挂载到 /app/data。
# worker 消费 default,scan（扫描）；media-worker 专门消费 media（拆镜头/派生/导出，
# FFmpeg 重负载，默认并发 1，与扫描隔离）；ai-worker 消费 ai（PR-03A 外部 AI 理解）；
# search-worker 消费 search（PR-04 检索文档索引/嵌入；仅 DB+redis+embedder，不挂源目录）；
# export-worker 消费 export（PR-05 Gate B 脚本剪辑清单 CSV 导出；仅 DB+redis，写 /app/data）。
# 本地真实语义检索：docker compose --profile embedding up -d embedder（torch+多语模型）。

x-app-env: &app-env
  env_file:
    - .env
  environment:
    # 强制 Python UTF-8，保证非 ASCII（中文）文件名被正确解码/索引
    PYTHONUTF8: "1"
    LANG: C.UTF-8

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clipmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clipmind}
      POSTGRES_DB: ${POSTGRES_DB:-clipmind}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clipmind} -d ${POSTGRES_DB:-clipmind}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 一次性迁移：先于 api/worker 把数据库迁到最新；完成即退出（禁止删库重建）。
  # 注意：升级**已有**数据库时，`docker compose up -d` 不会重跑已成功退出的本服务，会跳过迁移
  # → API 以旧 schema 启动并对新接口 500。升级务必显式运行 `bash scripts/db_upgrade.sh`
  # （= `docker compose run --rm migrate`）。详见 docs/DATABASE_UPGRADE.md。
  migrate:
    build:
      context: .
      dockerfile: infra/api.Dockerfile
    <<: *app-env
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/api.Dockerfile
    <<: *app-env
    # 默认仅绑定 127.0.0.1，不对公网开放（PR-01 无鉴权）
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ${HOST_SOURCE_DIR:-./sample_media}:/app/source:ro
      - clipmind-data:/app/data
      - clipmind-uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    # healthcheck 用 live（仅进程），避免依赖服务短暂异常导致容器反复重启
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    <<: *app-env
    command: ["celery", "-A", "clipmind_worker.celery_app", "worker", "-Q", "default,scan", "-c", "2", "-l", "INFO"]
    volumes:
      - ${HOST_SOURCE_DIR:-./sample_media}:/app/source:ro
      - clipmind-data:/app/data
      - clipmind-uploads:/app/uploads:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # AAP：Celery beat 定时调度（SCAN_INTERVAL_MINUTES>0 时按间隔自动扫描全部源目录；
  # <=0 时无调度空转）。schedule 状态文件写 /app/data/beat（可读写卷）。
  beat:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    <<: *app-env
    command:
      [
        "sh", "-c",
        "mkdir -p /app/data/beat && exec celery -A clipmind_worker.celery_app beat -s /app/data/beat/celerybeat-schedule -l INFO",
      ]
    volumes:
      - clipmind-data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # PR-02：专用媒体处理 worker，仅消费 media 队列（拆镜头/派生/导出）。
  # FFmpeg 属 CPU/IO 密集型，默认并发 1，避免长任务阻塞目录扫描。源仍只读。
  media-worker:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    <<: *app-env
    command: ["celery", "-A", "clipmind_worker.celery_app", "worker", "-Q", "media", "-c", "${MEDIA_WORKER_CONCURRENCY:-1}", "-l", "INFO"]
    volumes:
      - ${HOST_SOURCE_DIR:-./sample_media}:/app/source:ro
      - clipmind-data:/app/data
      - clipmind-uploads:/app/uploads:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # PR-03A：AI 理解 worker，仅消费 ai 队列（外部 AI API 调用）。只读 /app/data 关键帧。
  # AI_PROVIDER 留空=NotConfigured（绝不调用任何 API）；fake 用于测试/CI；mimo 为真实 provider。
  ai-worker:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    <<: *app-env
    command: ["celery", "-A", "clipmind_worker.celery_app", "worker", "-Q", "ai", "-c", "${AI_WORKER_CONCURRENCY:-2}", "-l", "INFO"]
    volumes:
      - clipmind-data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # PR-04：检索文档索引 worker，仅消费 search 队列（构建检索文档 + 调 Embedding 写向量）。
  # 仅访问 DB/redis/embedder，不挂载源目录或派生数据。EMBEDDING_PROVIDER 决定是否调 embedder。
  search-worker:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    <<: *app-env
    command: ["celery", "-A", "clipmind_worker.celery_app", "worker", "-Q", "search", "-c", "${SEARCH_WORKER_CONCURRENCY:-2}", "-l", "INFO"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # PR-05 Gate B：导出 worker，仅消费 export 队列（脚本剪辑清单 CSV 导出）。
  # 仅访问 DB/redis + 写 /app/data（script_exports/），不挂载源目录。CSV 生成为轻量任务，默认并发 1。
  export-worker:
    build:
      context: .
      dockerfile: infra/worker.Dockerfile
    <<: *app-env
    command: ["celery", "-A", "clipmind_worker.celery_app", "worker", "-Q", "export", "-c", "${EXPORT_WORKER_CONCURRENCY:-1}", "-l", "INFO"]
    volumes:
      - clipmind-data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # PR-04（可选）：本地 Embedding 微服务。仅 profile "embedding" 启用，避免默认/CI 下载 torch+模型。
  # api/search-worker 通过 EMBEDDING_BASE_URL=http://embedder:8100 调用（OpenAI 兼容 /embeddings）。
  embedder:
    build:
      context: .
      dockerfile: infra/embedder.Dockerfile
    profiles: ["embedding"]
    env_file:
      - .env
    environment:
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-intfloat/multilingual-e5-small}
      # 默认固定为已验证的不可变 commit（公开模型，非敏感）；与 EMBEDDING_MODEL_REVISION 一致
      EMBEDDER_MODEL_REVISION: ${EMBEDDER_MODEL_REVISION:-614241f622f53c4eeff9890bdc4f31cfecc418b3}
      EMBEDDER_DIMENSION: ${EMBEDDER_DIMENSION:-384}
      EMBEDDER_DEVICE: ${EMBEDDER_DEVICE:-cpu}
    # 内部服务：容器间以 embedder:8100 互访。仅绑定 127.0.0.1 供本地验收，绝不对公网开放；
    # NAS 生产部署可移除本 ports（仅留服务名互访）。
    ports:
      - "127.0.0.1:${EMBEDDER_PORT:-8100}:8100"
    volumes:
      - embedder-models:/models   # 模型缓存独立卷（支持离线缓存启动）
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/web.Dockerfile
    environment:
      # 仅服务端使用，用于 /api 同源代理；不会下发到浏览器
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
      NODE_ENV: production
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  clipmind-data:
  clipmind-uploads:   # 网页上传可写区（独立于只读 NAS 源）
  embedder-models:    # PR-04 可选 embedder 的模型缓存（profile "embedding"）

# 默认网络子网可配置（可移植、不含任何环境专属硬编码）。
# 背景：当内网 AI Provider（如公司 MiMo）的私网 IP 落入 Docker 自动分配给本项目网络的
# 子网段时，容器会把该 IP 误判为本桥"直连"，对其在桥上 ARP 而 No route to host（宿主机却可达）。
# 解法：把本项目网络子网改到不与 Provider 私网地址重叠的段，使该 IP 经默认网关转发到宿主机。
# 默认 172.28.10.0/24 避开常见的 172.17(docker0) 与 172.19；若你本机该段已被占用或 Provider IP
# 仍落入其中，用 CLIPMIND_DOCKER_SUBNET 覆盖。检测命令：
#   python scripts/diagnose_ai_network.py --subnet ${CLIPMIND_DOCKER_SUBNET:-172.28.10.0/24} --show-ip
networks:
  default:
    ipam:
      config:
        - subnet: ${CLIPMIND_DOCKER_SUBNET:-172.28.10.0/24}
