name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: clipmind
          POSTGRES_PASSWORD: clipmind
          POSTGRES_DB: clipmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clipmind -d clipmind_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://clipmind:clipmind@localhost:5432/clipmind_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 安装 ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/shared
          pip install -e "./apps/api[dev]"
          pip install -e "./services/worker[dev]"
      - name: Ruff 静态检查
        run: ruff check packages/shared apps/api services/worker
      - name: Pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: 安装依赖
        run: npm ci || npm install
      - name: ESLint
        run: npm run lint
      - name: TypeScript 类型检查
        run: npm run typecheck
      - name: 前端测试
        run: npm test
      - name: 构建
        run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 校验 docker compose 配置
        run: |
          cp .env.example .env
          docker compose config
